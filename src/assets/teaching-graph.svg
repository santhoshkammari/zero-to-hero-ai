<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="'Inter', 'Segoe UI', sans-serif">

  <!-- Background -->
  <rect width="1100" height="820" fill="#0f1117"/>

  <!-- Title -->
  <text x="550" y="48" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" letter-spacing="0.5">The Teaching Graph</text>
  <text x="550" y="70" text-anchor="middle" fill="#666" font-size="13">Brandon Rohrer · soul.md · The skeleton behind every concept</text>

  <!-- ── FLOW ARROWS between nodes ── -->
  <!-- N1→N2 -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#444"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e05c5c"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5b9bd5"/>
    </marker>
  </defs>

  <!-- Main chain arrows (vertical spine) -->
  <line x1="550" y1="178" x2="550" y2="218" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="550" y1="298" x2="550" y2="338" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="550" y1="418" x2="550" y2="458" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="550" y1="538" x2="550" y2="578" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="550" y1="618" x2="550" y2="658" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="550" y1="738" x2="550" y2="775" stroke="#e05c5c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>

  <!-- N3→N4 (skip over break) -->
  <line x1="550" y1="298" x2="550" y2="338" stroke="#444" stroke-width="2"/>

  <!-- Emotional layer lines (left side) -->
  <line x1="160" y1="145" x2="160" y2="700" stroke="#5b9bd5" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- dots on emotional spine -->
  <circle cx="160" cy="145" r="4" fill="#5b9bd5"/>
  <circle cx="160" cy="268" r="4" fill="#5b9bd5"/>
  <circle cx="160" cy="388" r="4" fill="#5b9bd5"/>
  <circle cx="160" cy="508" r="4" fill="#5b9bd5"/>
  <circle cx="160" cy="628" r="4" fill="#5b9bd5"/>
  <circle cx="160" cy="700" r="4" fill="#5b9bd5"/>
  <!-- connectors to nodes -->
  <line x1="160" y1="145" x2="380" y2="148" stroke="#5b9bd5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="160" y1="268" x2="380" y2="268" stroke="#5b9bd5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="160" y1="388" x2="380" y2="388" stroke="#5b9bd5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="160" y1="508" x2="380" y2="508" stroke="#5b9bd5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="160" y1="628" x2="380" y2="628" stroke="#5b9bd5" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="160" y1="700" x2="380" y2="700" stroke="#5b9bd5" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Cut rule line (right side) -->
  <line x1="940" y1="145" x2="940" y2="700" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>
  <circle cx="940" cy="145" r="4" fill="#888"/>
  <circle cx="940" cy="268" r="4" fill="#888"/>
  <circle cx="940" cy="388" r="4" fill="#888"/>
  <circle cx="940" cy="508" r="4" fill="#888"/>
  <circle cx="940" cy="628" r="4" fill="#888"/>
  <circle cx="940" cy="700" r="4" fill="#888"/>
  <line x1="940" y1="145" x2="720" y2="148" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="940" y1="268" x2="720" y2="268" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="940" y1="388" x2="720" y2="388" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="940" y1="508" x2="720" y2="508" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="940" y1="628" x2="720" y2="628" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="940" y1="700" x2="720" y2="700" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══════════════════════════════════════════
       NODE 1 — SITUATION
  ══════════════════════════════════════════ -->
  <rect x="380" y="118" width="340" height="60" rx="10" fill="#1e2a1e" stroke="#4caf50" stroke-width="2"/>
  <text x="550" y="142" text-anchor="middle" fill="#4caf50" font-size="11" font-weight="700" letter-spacing="1">N1 · SITUATION</text>
  <text x="550" y="160" text-anchor="middle" fill="#b8d4b8" font-size="12">One concrete scenario. No setup. Reader feels the itch.</text>
  <!-- emotional label left -->
  <text x="155" y="141" text-anchor="end" fill="#5b9bd5" font-size="11">confusion</text>
  <!-- cut label right -->
  <text x="945" y="141" text-anchor="start" fill="#888" font-size="11">cut: definitions, history</text>

  <!-- ══════════════════════════════════════════
       NODE 2 — INSTINCT
  ══════════════════════════════════════════ -->
  <rect x="380" y="238" width="340" height="60" rx="10" fill="#1e2020" stroke="#888" stroke-width="1.5"/>
  <text x="550" y="262" text-anchor="middle" fill="#aaa" font-size="11" font-weight="700" letter-spacing="1">N2 · INSTINCT</text>
  <text x="550" y="280" text-anchor="middle" fill="#999" font-size="12">"A naïve approach would be..." — the dumb thing anyone tries.</text>
  <text x="155" y="264" text-anchor="end" fill="#5b9bd5" font-size="11">recognition</text>
  <text x="945" y="264" text-anchor="start" fill="#888" font-size="11">cut: caveats, alternatives</text>

  <!-- ══════════════════════════════════════════
       NODE 3 — BREAK
  ══════════════════════════════════════════ -->
  <rect x="380" y="338" width="340" height="60" rx="10" fill="#251a1a" stroke="#e05c5c" stroke-width="2"/>
  <text x="550" y="362" text-anchor="middle" fill="#e05c5c" font-size="11" font-weight="700" letter-spacing="1">N3 · BREAK</text>
  <text x="550" y="380" text-anchor="middle" fill="#d4a0a0" font-size="12">One precise reason the instinct fails. One sentence. Reader feels it.</text>
  <text x="155" y="364" text-anchor="end" fill="#5b9bd5" font-size="11">discomfort</text>
  <text x="945" y="364" text-anchor="start" fill="#888" font-size="11">cut: multiple failure modes</text>

  <!-- ══════════════════════════════════════════
       NODE 4 — FIX
  ══════════════════════════════════════════ -->
  <rect x="380" y="458" width="340" height="60" rx="10" fill="#1a1e25" stroke="#5b9bd5" stroke-width="2"/>
  <text x="550" y="482" text-anchor="middle" fill="#5b9bd5" font-size="11" font-weight="700" letter-spacing="1">N4 · FIX</text>
  <text x="550" y="500" text-anchor="middle" fill="#a0b8d4" font-size="12">Minimal solution. Only fixes this break. Not general. Not elegant.</text>
  <text x="155" y="484" text-anchor="end" fill="#5b9bd5" font-size="11">relief</text>
  <text x="945" y="484" text-anchor="start" fill="#888" font-size="11">cut: full generalization</text>

  <!-- ══════════════════════════════════════════
       NODE 5 — PROOF
  ══════════════════════════════════════════ -->
  <rect x="380" y="578" width="340" height="60" rx="10" fill="#1e1e1a" stroke="#f0c040" stroke-width="2"/>
  <text x="550" y="602" text-anchor="middle" fill="#f0c040" font-size="11" font-weight="700" letter-spacing="1">N5 · PROOF</text>
  <text x="550" y="620" text-anchor="middle" fill="#d4c880" font-size="12">Image / example AFTER the idea. Confirms. Does not introduce.</text>
  <text x="155" y="604" text-anchor="end" fill="#5b9bd5" font-size="11">"oh, yes"</text>
  <text x="945" y="604" text-anchor="start" fill="#888" font-size="11">cut: image before concept</text>

  <!-- ══════════════════════════════════════════
       NODE 6 — NAME
  ══════════════════════════════════════════ -->
  <rect x="380" y="658" width="340" height="60" rx="10" fill="#1e1a25" stroke="#b08de0" stroke-width="2"/>
  <text x="550" y="682" text-anchor="middle" fill="#b08de0" font-size="11" font-weight="700" letter-spacing="1">N6 · NAME</text>
  <text x="550" y="700" text-anchor="middle" fill="#c8b8e0" font-size="12">"By the way, this is called X." Jargon is a reward, not an entry gate.</text>
  <text x="155" y="684" text-anchor="end" fill="#5b9bd5" font-size="11">ownership</text>
  <text x="945" y="684" text-anchor="start" fill="#888" font-size="11">cut: definition-first vocab</text>

  <!-- ══════════════════════════════════════════
       NODE 7 — EDGE  (forward pull → next concept)
  ══════════════════════════════════════════ -->
  <rect x="380" y="778" width="340" height="28" rx="8" fill="#251e10" stroke="#e05c5c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="550" y="797" text-anchor="middle" fill="#e09050" font-size="12">N7 · EDGE — new limitation revealed → pulls reader into next concept</text>

  <!-- Loop arrow N7→N1 next concept -->
  <path d="M 720 792 Q 820 792 820 130 Q 820 100 720 100 Q 650 100 620 118" stroke="#e05c5c" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-red)"/>
  <text x="825" y="460" text-anchor="start" fill="#e05c5c" font-size="11" transform="rotate(90,825,460)">next concept →</text>

  <!-- ── LEFT COLUMN LABEL ── -->
  <text x="80" y="420" text-anchor="middle" fill="#5b9bd5" font-size="12" font-weight="600" transform="rotate(-90,80,420)">EMOTIONAL ARC</text>

  <!-- ── RIGHT COLUMN LABEL ── -->
  <text x="1020" y="420" text-anchor="middle" fill="#888" font-size="12" font-weight="600" transform="rotate(90,1020,420)">WHAT TO CUT</text>

  <!-- ── BOTTOM RULE ── -->
  <rect x="200" y="735" width="148" height="32" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="274" y="749" text-anchor="middle" fill="#888" font-size="10" font-weight="600">BRANDON'S TEST</text>
  <text x="274" y="762" text-anchor="middle" fill="#666" font-size="10">Can you remove it without</text>

  <rect x="200" y="770" width="148" height="18" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="274" y="783" text-anchor="middle" fill="#666" font-size="10">breaking the chain? → CUT IT</text>

  <!-- ── "Notice that" rhetorical move badge ── -->
  <rect x="60" y="760" width="120" height="30" rx="6" fill="#1a1a2a" stroke="#5b9bd5" stroke-width="1"/>
  <text x="120" y="778" text-anchor="middle" fill="#5b9bd5" font-size="11">"Notice that…"</text>
  <text x="120" y="790" text-anchor="middle" fill="#555" font-size="10">insight belongs to reader</text>

</svg>
